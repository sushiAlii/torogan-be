services:
  postgres:
    image: postgres:16-alpine
    container_name: torogan-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - torogan-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: torogan-be:prod
    container_name: torogan-be
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DB_HOST: torogan-postgres
      APP_ENV: production
    networks:
      - torogan-network

volumes:
  postgres_data:
    driver: local

networks:
  torogan-network:
    driver: bridge
    name: torogan-network
