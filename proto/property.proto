syntax = "proto3";

package property.v1;

option go_package = "github.com/sushiAlii/torogan-be/gen/propertyv1;propertyv1";

import "google/protobuf/timestamp.proto";
import "google/api/annotations.proto";
import "feature.proto";

// 1. Core Data Structure (The base object shared across APIs)
message Property {
  string id = 1;
  string title = 2;
  double size_sq_m = 3;
  string description = 4;
  string price = 5; // String ensures high precision for currency across languages
  string owner_id = 6;
  google.protobuf.Timestamp created_at = 7;
  google.protobuf.Timestamp updated_at = 8;
  int32 bedrooms = 9;
  double bathrooms = 10;
  string main_image_url = 11; // populated on list and detail responses
  repeated PropertyImage images = 12; // populated on GetPropertyByID only
  string type = 13; // one of: Apartment, Studio, House, Townhouse
  OwnerContact owner_contact = 14; // populated on GetPropertyByID only, and only for authenticated callers
  google.protobuf.Timestamp expires_at = 15;
  bool is_rented = 16;
  string status = 17; // one of: active, expired, rented — server-computed, read-only
  google.protobuf.Timestamp deleted_at = 18; // set only for soft-deleted listings
}

message PropertyImage {
  string id = 1;
  string property_id = 2;
  string url = 3;
  bool is_main = 4;
  int32 position = 5;
}

message OwnerContact {
  string name = 1;
  string email = 2;
  string phone = 3;
  string avatar_url = 4;
}

message CreatePropertyRequest {
  string title = 1;
  double size_sq_m = 2;
  string description = 3;
  string price = 4;
  // owner_id is intentionally omitted: the owner is derived from the
  // authenticated caller (see the auth interceptor), not client input.
  reserved 5;
  reserved "owner_id";
  int32 bedrooms = 6;
  double bathrooms = 7;
  string type = 8; // one of: Apartment, Studio, House, Townhouse
  int32 expiration_days = 9; // one of: 7, 15, 30
}

message GetPropertyByIDRequest {
  string id = 1;
}

message GetPropertyListRequest {
  string cursor = 1;
  int32 limit = 2;
  string search = 3;
}

message GetPropertyListResponse {
  repeated Property properties = 1;
  string next_cursor = 2;
  int32 total_count = 3;
}

message UpdatePropertyByIDRequest {
  string id = 1;
  string title = 2;
  double size_sq_m = 3;
  string description = 4;
  string price = 5;
  int32 bedrooms = 6;
  double bathrooms = 7;
  string type = 8; // one of: Apartment, Studio, House, Townhouse
}

// 6. DELETE ENDPOINT MESSAGES
message DeletePropertyByIDRequest {
  string id = 1;
}

message DeletePropertyByIDResponse {
  bool success = 1;
  string message = 2;
}

// 6b. OWNER-SCOPED LISTING MANAGEMENT MESSAGES
message GetMyPropertyListRequest {}

message GetMyPropertyListResponse {
  repeated Property properties = 1;
}

message RenewPropertyRequest {
  string id = 1;
  int32 expiration_days = 2; // one of: 7, 15, 30
}

message MarkPropertyRentedRequest {
  string id = 1;
}

message MarkPropertyAvailableRequest {
  string id = 1;
}

message GetMyDeletedPropertyListRequest {}

message GetMyDeletedPropertyListResponse {
  repeated Property properties = 1;
}

message RestorePropertyRequest {
  string id = 1;
}

// 7. PROPERTY <-> FEATURE SUB-RESOURCE MESSAGES
message AddPropertyFeatureRequest {
  string property_id = 1;
  int32 feature_id = 2;
}

message RemovePropertyFeatureRequest {
  string property_id = 1;
  int32 feature_id = 2;
}

message ListPropertyFeaturesRequest {
  string property_id = 1;
}

message ListPropertyFeaturesResponse {
  repeated feature.v1.Feature features = 1;
}

// 8. PROPERTY <-> IMAGE SUB-RESOURCE MESSAGES
message AddPropertyImageRequest {
  string property_id = 1;
  string url = 2;
  bool is_main = 3;
  int32 position = 4;
}

message RemovePropertyImageRequest {
  string property_id = 1;
  string image_id = 2;
}

message ListPropertyImagesRequest {
  string property_id = 1;
}

message ListPropertyImagesResponse {
  repeated PropertyImage images = 1;
}

service PropertyService {
  rpc CreateProperty(CreatePropertyRequest) returns (Property) {
    option (google.api.http) = {
      post: "/v1/properties"
      body: "*"
    };
  }
  rpc GetPropertyByID(GetPropertyByIDRequest) returns (Property){
    option (google.api.http) = {
      get: "/v1/properties/{id}"
    };
  }
  rpc GetPropertyList(GetPropertyListRequest) returns (GetPropertyListResponse) {
    option (google.api.http) = {
      get: "/v1/properties"
    };
  }
  rpc UpdatePropertyByID(UpdatePropertyByIDRequest) returns (Property) {
    option (google.api.http) = {
      put: "/v1/properties/{id}"
      body: "*"
    };
  }
  rpc DeletePropertyByID(DeletePropertyByIDRequest) returns (DeletePropertyByIDResponse) {
    option (google.api.http) = {
      delete: "/v1/properties/{id}"
    };
  }
  rpc GetMyPropertyList(GetMyPropertyListRequest) returns (GetMyPropertyListResponse) {
    option (google.api.http) = {
      get: "/v1/my-properties"
    };
  }
  rpc RenewProperty(RenewPropertyRequest) returns (Property) {
    option (google.api.http) = {
      post: "/v1/properties/{id}/renew"
      body: "*"
    };
  }
  rpc MarkPropertyRented(MarkPropertyRentedRequest) returns (Property) {
    option (google.api.http) = {
      post: "/v1/properties/{id}/rent"
      body: "*"
    };
  }
  rpc MarkPropertyAvailable(MarkPropertyAvailableRequest) returns (Property) {
    option (google.api.http) = {
      post: "/v1/properties/{id}/unrent"
      body: "*"
    };
  }
  rpc GetMyDeletedPropertyList(GetMyDeletedPropertyListRequest) returns (GetMyDeletedPropertyListResponse) {
    option (google.api.http) = {
      get: "/v1/my-properties/deleted"
    };
  }
  rpc RestoreProperty(RestorePropertyRequest) returns (Property) {
    option (google.api.http) = {
      post: "/v1/properties/{id}/restore"
      body: "*"
    };
  }
  rpc AddPropertyFeature(AddPropertyFeatureRequest) returns (ListPropertyFeaturesResponse) {
    option (google.api.http) = {
      post: "/v1/properties/{property_id}/features"
      body: "*"
    };
  }
  rpc RemovePropertyFeature(RemovePropertyFeatureRequest) returns (DeletePropertyByIDResponse) {
    option (google.api.http) = {
      delete: "/v1/properties/{property_id}/features/{feature_id}"
    };
  }
  rpc ListPropertyFeatures(ListPropertyFeaturesRequest) returns (ListPropertyFeaturesResponse) {
    option (google.api.http) = {
      get: "/v1/properties/{property_id}/features"
    };
  }
  rpc AddPropertyImage(AddPropertyImageRequest) returns (ListPropertyImagesResponse) {
    option (google.api.http) = {
      post: "/v1/properties/{property_id}/images"
      body: "*"
    };
  }
  rpc RemovePropertyImage(RemovePropertyImageRequest) returns (DeletePropertyByIDResponse) {
    option (google.api.http) = {
      delete: "/v1/properties/{property_id}/images/{image_id}"
    };
  }
  rpc ListPropertyImages(ListPropertyImagesRequest) returns (ListPropertyImagesResponse) {
    option (google.api.http) = {
      get: "/v1/properties/{property_id}/images"
    };
  }
}