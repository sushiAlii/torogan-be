name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  GO_VERSION: "1.26.x"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2

      - name: Verify go.mod/go.sum are tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum || {
            echo "::error::go.mod/go.sum are out of date — run 'go mod tidy' and commit the result."
            exit 1
          }

  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: torogan_db
          POSTGRES_USER: torogan_user
          POSTGRES_PASSWORD: torogan_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U torogan_user -d torogan_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DB_HOST: localhost
      DB_PORT: "5432"
      DB_NAME: torogan_db
      DB_USER: torogan_user
      DB_PASSWORD: torogan_password
      DB_SSLMODE: disable

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Build
        run: go build ./...

      - name: Apply migrations (also serves as a migration smoke test)
        run: |
          docker run --rm --network host \
            -v "${{ github.workspace }}/internal/database/migrations:/migrations" \
            migrate/migrate:v4.17.1 \
            -path=/migrations \
            -database "postgres://${DB_USER}:${DB_PASSWORD}@${DB_HOST}:${DB_PORT}/${DB_NAME}?sslmode=${DB_SSLMODE}" \
            up

      - name: Test
        run: go test ./...
