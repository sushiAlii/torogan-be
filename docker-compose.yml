version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: torogan-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: torogan_db
      POSTGRES_USER: torogan_user
      POSTGRES_PASSWORD: torogan_password
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    networks:
      - torogan-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U torogan_user -d torogan_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: torogan-be
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/tmp
    networks:
      - torogan-network

volumes:
  postgres_data:
    driver: local

networks:
  torogan-network:
    driver: bridge
    name: torogan-network
