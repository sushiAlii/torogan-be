root = "."
tmp_dir = "tmp"

[build]
  # Just build the main entry point
  cmd = "go build -o ./tmp/main ./cmd/server/main.go"
  # Run the binary
  bin = "./tmp/main"
  # Watch for these extensions
  include_ext = ["go", "tpl", "tmpl", "html", "toml", "proto"]
  # Ignore these directories
  exclude_dir = ["assets", "tmp", "vendor", "gen"]
  # Watch these directories
  include_dir = []
  # Exclude specific files
  exclude_file = []
  # Delay rebuild slightly to let files settle
  delay = 1000 # ms
  # Stop running binary if build fails
  stop_on_error = true
  # Log time
  log = "air.log"

[color]
  main = "magenta"
  watcher = "cyan"
  build = "yellow"
  runner = "green"